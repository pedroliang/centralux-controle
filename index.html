<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralux Controle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo">
                        <i class="fas fa-layer-group"></i>
                        <span>Centralux</span>
                    </div>
                    <button id="sidebar-toggle" title="Alternar Menu">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                </div>
                <h1 class="sidebar-subtitle">Controle</h1>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item active" data-url="https://centraluxinventory.netlify.app/" data-name="Estoque">
                        <div class="nav-link">
                            <i class="fas fa-boxes-stacked"></i>
                            <span>Estoque</span>
                        </div>
                        <a href="https://centraluxinventory.netlify.app/" target="_blank" class="external-link" title="Abrir em nova aba">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </li>
                    <li class="nav-item" data-url="https://docs.google.com/spreadsheets/d/1534KpKX7vCVz0W-FWezgHTSZqHcpy6-bG8vgGXAzUeM/preview" data-name="Planilha Geral">
                        <div class="nav-link">
                            <i class="fas fa-table"></i>
                            <span>Planilha Geral</span>
                        </div>
                        <a href="https://docs.google.com/spreadsheets/d/1534KpKX7vCVz0W-FWezgHTSZqHcpy6-bG8vgGXAzUeM/edit" target="_blank" class="external-link" title="Abrir em nova aba">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </li>
                    <li class="nav-item" data-url="https://centraluxsaida.lovable.app/" data-name="Relatorio de Saida">
                        <div class="nav-link">
                            <i class="fas fa-file-export"></i>
                            <span>Relatório Saída</span>
                        </div>
                        <a href="https://centraluxsaida.lovable.app/" target="_blank" class="external-link" title="Abrir em nova aba">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </li>
                    <li class="nav-item" data-url="https://pedroliang.github.io/centraluxyms2/#/" data-name="YMS">
                        <div class="nav-link">
                            <i class="fas fa-truck-moving"></i>
                            <span>YMS</span>
                        </div>
                        <a href="https://pedroliang.github.io/centraluxyms2/#/" target="_blank" class="external-link" title="Abrir em nova aba">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </li>
                    <li class="nav-item" data-url="https://centraeluxanalise.lovable.app/" data-name="Analise Estoque">
                        <div class="nav-link">
                            <i class="fas fa-chart-line"></i>
                            <span>Análise Estoque</span>
                        </div>
                        <a href="https://centraeluxanalise.lovable.app/" target="_blank" class="external-link" title="Abrir em nova aba">
                            <i class="fas fa-external-link-alt"></i>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <p>Liang Solution</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="current-site-info">
                    <h2 id="active-site-title">Estoque</h2>
                </div>
                <div class="actions">
                    <div class="zoom-controls">
                        <button id="zoom-out" title="Diminuir Zoom">
                            <i class="fas fa-minus"></i>
                        </button>
                        <span id="zoom-level">100%</span>
                        <button id="zoom-in" title="Aumentar Zoom">
                            <i class="fas fa-plus"></i>
                        </button>
                        <button id="zoom-reset" title="Resetar Zoom">
                            <i class="fas fa-undo"></i>
                        </button>
                    </div>
                    <div class="divider"></div>
                    <button id="refresh-btn" title="Recarregar">
                        <i class="fas fa-redo"></i>
                    </button>
                    <button id="fullscreen-btn" title="Tela Cheia">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </header>
            <div class="iframe-container">
                <iframe id="main-frame" src="https://centraluxinventory.netlify.app/" frameborder="0"></iframe>
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
